version: '3.8'

services:
  # ============================================
  # 1. DATABASE (MySQL 8.0)
  # ============================================
  db:
    image: mysql:8.0
    container_name: restaurant_db_dev
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-12345678}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-restaurant_db}
      MYSQL_USER: ${MYSQL_USER:-restaurant_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-restaurant_pass}
      # Cấu hình múi giờ
      TZ: 'Asia/Ho_Chi_Minh'
    ports:
      - "${DB_PORT:-3307}:3306"
    volumes:
      # Lưu dữ liệu DB bền vững giữa các lần chạy
      - db_data:/var/lib/mysql
      # [TÙY CHỌN] Mount custom SQL init scripts
      - ./backend/docker/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - restaurant_network
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      timeout: 20s
      retries: 10
      interval: 10s

  # ============================================
  # 2. BACKEND (Node.js + Express)
  # ============================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: restaurant_backend_dev
    restart: always
    ports:
      - "${BACKEND_PORT:-5000}:5000"
    environment:
      # Database Connection
      DATABASE_URL: mysql://${MYSQL_USER:-restaurant_user}:${MYSQL_PASSWORD:-restaurant_pass}@db:3306/${MYSQL_DATABASE:-restaurant_db}

      # Server Config
      PORT: 5000
      NODE_ENV: development

      # JWT & Auth
      JWT_SECRET: ${JWT_SECRET:-doan_tot_nghiep_2025_dev_key}

      # VNPAY Config (Sandbox)
      VNP_TMN_CODE: ${VNP_TMN_CODE:-M1BA4CZ8}
      VNP_HASH_SECRET: ${VNP_HASH_SECRET:-HJKK16907C4JWUAAAFSKKKWZPYM667UM}
      VNP_URL: ${VNP_URL:-https://sandbox.vnpayment.vn/paymentv2/vpcpay.html}
      VNP_RETURN_URL: ${VNP_RETURN_URL:-http://localhost:5000/api/payment/vnpay_return}

      # Google Gemini API
      GEMINI_API_KEY: ${GEMINI_API_KEY:-your_gemini_key_here}

      # Time Zone
      TZ: 'Asia/Ho_Chi_Minh'

    volumes:
      # Hot reload: mount toàn bộ src folder (trừ node_modules)
      - ./backend/src:/app/src
      - ./backend/prisma:/app/prisma
      - /app/node_modules
      - ./backend/uploads:/app/uploads

    depends_on:
      db:
        condition: service_healthy

    networks:
      - restaurant_network

    # Logs
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ============================================
  # 3. FRONTEND (React + Vite)
  # ============================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:5000}
    container_name: restaurant_frontend_dev
    restart: always
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:5000}
      TZ: 'Asia/Ho_Chi_Minh'

    volumes:
      # Hot reload: mount src folder (trừ node_modules)
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - ./frontend/index.html:/app/index.html
      - ./frontend/vite.config.js:/app/vite.config.js
      - /app/node_modules

    depends_on:
      - backend

    networks:
      - restaurant_network

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

# ============================================
# Networks & Volumes
# ============================================
networks:
  restaurant_network:
    driver: bridge

volumes:
  db_data:
    driver: local
