version: '3.8'

services:
  # 1. DATABASE (MySQL)
  db:
    image: mysql:8.0
    container_name: restaurant_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: 12345678  # Mật khẩu root
      MYSQL_DATABASE: restaurant_db
    ports:
      - "3307:3306" # Map ra cổng 3307 máy thật để tránh đụng XAMPP
    volumes:
      - db_data:/var/lib/mysql # Lưu dữ liệu bền vững

  # 2. BACKEND
  backend:
    build: ./backend
    container_name: restaurant_backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      # QUAN TRỌNG: Hostname là tên service 'db', không phải localhost
      DATABASE_URL: "mysql://root:12345678@db:3306/restaurant_db"
      PORT: 5000
      JWT_SECRET: "doan_tot_nghiep_2025"
      # Các Key VNPAY/AI giữ nguyên (hoặc paste lại vào đây nếu muốn)
      GEMINI_API_KEY: "PASTE_YOUR_API_KEY_HERE"
      VNP_TMN_CODE: "K3AGOSTG"
      VNP_HASH_SECRET: "NW2HLHNWCIGU7OWMGOZ5P3HTP3PNQ41V"
      VNP_URL: "https://sandbox.vnpayment.vn/paymentv2/vpcpay.html"
      VNP_RETURN_URL: "http://localhost:5173/payment-result"
    depends_on:
      - db # Chờ db chạy trước

  # 3. FRONTEND
  frontend:
    build: ./frontend
    container_name: restaurant_frontend
    restart: always
    ports:
      - "5173:80" # Map cổng 80 của Nginx ra 5173 máy thật
    depends_on:
      - backend

volumes:
  db_data: